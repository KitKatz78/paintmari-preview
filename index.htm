<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paintmari.com — Under Construction</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        min-height: 100dvh;
        background: #faf9f7;
        color: #1f1f1f;
        font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    .page {
        width: min(100%, 780px);
        text-align: center;
        padding: clamp(38px, 8vw, 76px) clamp(24px, 7vw, 72px);
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid #ece7df;
        box-shadow: 0 24px 70px rgba(40, 34, 26, 0.08);
    }

    .artist-name {
        font-family: Garamond, Georgia, "Times New Roman", serif;
        font-size: clamp(20px, 4.2vw, 34px);
        font-weight: 400;
        letter-spacing: clamp(3px, 0.7vw, 8px);
        text-transform: uppercase;
        margin-bottom: 10px;
    }

    .artist-name-jap {
        font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS Mincho", serif;
        font-size: clamp(12px, 2.2vw, 17px);
        font-weight: 600;
        letter-spacing: clamp(2px, 0.45vw, 5px);
        margin-bottom: clamp(28px, 6vw, 54px);
    }

    .rule {
        width: 54px;
        height: 1px;
        background: #c9c2b7;
        margin: 0 auto clamp(26px, 5vw, 44px);
    }

    h1 {
        font-size: clamp(20px, 4vw, 32px);
        font-weight: 300;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 18px;
    }

    .message {
        max-width: 560px;
        margin: 0 auto;
        color: #4b4b4b;
        font-size: clamp(14px, 2.2vw, 17px);
        line-height: 1.85;
    }

    .message-jap {
        margin-top: 18px;
        font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS Mincho", serif;
        font-size: clamp(13px, 2vw, 16px);
        line-height: 1.9;
    }

    .footer {
        margin-top: clamp(34px, 7vw, 58px);
        color: #777;
        font-size: 11px;
        letter-spacing: 1px;
    }

    @media screen and (max-width: 480px) {
        body {
            padding: 18px;
        }

        .page {
            padding: 34px 22px;
        }

        h1 {
            letter-spacing: 2px;
        }
    }
</style>
</head>
<body>
<div class="page">
    <div class="artist-name">Mari Ochi Moosreiner</div>
    <div class="artist-name-jap">ムースライナー越智まり</div>
    <div class="rule"></div>

    <h1>Under Construction</h1>

    <div class="message">
        paintmari.com is currently being updated. Please check back soon.
        <div class="message-jap">paintmari.com は現在更新中です。しばらくしてから再度ご覧ください。</div>
    </div>

    <div class="footer" data-copyright-year="2006">
        &copy; <span id="copyright-year">2026</span> Paintmari.com. All Rights Reserved.
    </div>
</div>
<script>
(function () {
    var yearElements = document.querySelectorAll('[data-copyright-year]');
    var currentYear = new Date().getFullYear();

    for (var i = 0; i < yearElements.length; i++) {
        var startYear = parseInt(yearElements[i].getAttribute('data-copyright-year'), 10);
        var span = yearElements[i].querySelector('#copyright-year');
        if (!span) continue;
        span.textContent = startYear && startYear < currentYear ? startYear + '-' + currentYear : currentYear;
    }
}());
</script>
</body>
</html>
