<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paintmari.com — Mari Ochi Moosreiner</title>
<meta name="description" content="Oil, Water Color, and Gouache Paintings and Drawings by artist and poet Mari Ochi Moosreiner.">
<meta name="keywords" content="art, abstract, painter, New England, New York, Japan, paint, oil, oil paint, watercolor, paper, canvas, color, brush, paints, artist, gallery, abstraction, oil on canvas, drawing, photography, mari, paint, moosreiner, ochi">
<meta name="author" content="Mari Ochi Moosreiner">
<meta name="robots" content="index,follow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #fff;
        color: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    .landing {
        text-align: center;
        width: 100%;
        max-width: 1100px;
        padding: 4vh 30px 3vh;
    }

    .artist-name {
        font-family: 'Garamond', 'Georgia', 'Times New Roman', serif;
        font-size: clamp(18px, 2.5vw, 28px);
        font-weight: 400;
        letter-spacing: clamp(3px, 0.5vw, 7px);
        text-transform: uppercase;
        color: #1a1a1a;
        margin-bottom: 8px;
    }

    .artist-name-jap {
        font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif;
        font-size: clamp(11px, 1.4vw, 16px);
        font-weight: 600;
        letter-spacing: clamp(2px, 0.4vw, 4px);
        color: #000;
        margin-bottom: clamp(20px, 4vh, 45px);
    }

    .rule {
        width: 50px;
        height: 1px;
        background: #ddd;
        margin: 0 auto;
    }

    .poem-frame {
        margin: clamp(15px, 3vh, 40px) auto;
    }

    .poem-frame img {
        display: block;
        margin: 0 auto;
        max-height: 58vh;
        max-width: 90%;
        width: auto;
        height: auto;
    }

    .enter-links {
        margin: clamp(20px, 3vh, 40px) 0 clamp(25px, 4vh, 55px);
    }

    .enter-links a {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: clamp(10px, 1.1vw, 12px);
        font-weight: 400;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #666;
        text-decoration: none;
        padding: 11px 32px;
        border: 1px solid #ddd;
        display: inline-block;
        margin: 0 6px;
        transition: color 0.3s ease, border-color 0.3s ease;
    }

    .enter-links a:hover {
        color: #1a1a1a;
        border-color: #999;
    }

    .landing-copyright {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 10px;
        letter-spacing: 1px;
        color: #777;
        font-weight: 400;
    }
</style>
</head>
<body>

<div class="landing">
    <div class="artist-name">Mari Ochi Moosreiner</div>
    <div class="artist-name-jap">ムースライナー越智まり</div>
    <div class="rule"></div>
    <div class="poem-frame">
        <img src="images/poemboth.png" alt="Undoing — a poem by Mari Ochi Moosreiner" />
    </div>
    <div class="rule"></div>
    <div class="enter-links">
        <a href="eng/indexeng.htm">English</a>
        <a href="jap/indexjap.htm">日本語</a>
    </div>
    <div class="landing-copyright" data-copyright-year="2006">
        &copy; <span id="copyright-year">2026</span> Paintmari.com. All Rights Reserved.
    </div>
</div>

<script src="js/copyright.js"></script>
</body>
</html>
